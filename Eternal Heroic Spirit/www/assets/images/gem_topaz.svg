<?xml version="1.0" encoding="UTF-8"?>
<!-- 黄宝石 topaz: 椭圆 imperial cut, 金黄 + 太阳放射光晕 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="topazG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff59d"/>
      <stop offset="50%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <radialGradient id="topazHalo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#fff9c4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topazCore" cx="0.5" cy="0.4" r="0.4">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fffde7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 太阳放射光晕 (8 条光线, 速度/阳光感) -->
  <g opacity="0.8" fill="#fff59d">
    <polygon points="32,2 33,12 31,12"/>
    <polygon points="32,62 33,52 31,52"/>
    <polygon points="2,32 12,31 12,33"/>
    <polygon points="62,32 52,31 52,33"/>
    <polygon points="11,11 18,17 17,18"/>
    <polygon points="53,11 46,17 47,18"/>
    <polygon points="11,53 17,47 18,46"/>
    <polygon points="53,53 46,47 47,46"/>
  </g>
  <!-- 椭圆外轮廓 -->
  <ellipse cx="32" cy="32" rx="18" ry="22" fill="url(#topazG)" stroke="#a85c00" stroke-width="1.5"/>
  <!-- 椭圆内部 facet -->
  <ellipse cx="32" cy="32" rx="14" ry="18" fill="none" stroke="#fff9c4" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="32" cy="32" rx="10" ry="13" fill="none" stroke="#ffe082" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="6" ry="8" fill="url(#topazCore)"/>
  <!-- 顶高光 -->
  <ellipse cx="26" cy="20" rx="5" ry="3" fill="#fffde7" opacity="0.85"/>
  <!-- 太阳中心圆 (圆形小珠) -->
  <circle cx="32" cy="32" r="2" fill="#fff176" opacity="0.9"/>
</svg>